name: Android Build

on:
  workflow_dispatch: {}
  push:
    branches:
      - claude/offline-android-study-app-pew3yj
    paths:
      - 'src/**'
      - 'public/**'
      - 'android/**'
      - 'capacitor.config.ts'
      - 'next.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/android-build.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install web dependencies
        run: npm ci

      - name: Build static web app
        run: npx next build

      - name: Sync Capacitor Android project
        run: npx cap sync android

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Install Android SDK components
        run: |
          COMPILE_SDK=$(grep -oP "compileSdkVersion = \K[0-9]+" android/variables.gradle)
          echo "Installing platform $COMPILE_SDK and matching build-tools"
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses > /dev/null || true
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            "platform-tools" \
            "platforms;android-${COMPILE_SDK}" \
            "build-tools;${COMPILE_SDK}.0.0"

      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: clinical-handbook-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
